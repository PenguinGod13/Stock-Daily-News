<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Watchlist</title>
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js"
    integrity="sha384-BmlQlKlDvXvKoxkn5OQuUo/aJQCTXeB+Kls6EccBmG4Kf8AXvp89RtO9MtPxP/r5"
    crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 680px; margin: 0 auto; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #374151; }
    .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 22px; }

    /* ── form fields ── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 7px;
      font-size: 14px;
      color: #111827;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    /* ── add-ticker grid ── */
    .add-grid {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 10px;
      align-items: end;
    }
    .add-grid .field { margin-bottom: 0; }
    .owned-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .owned-row .field { flex: 1; margin-bottom: 0; }
    .position-fields { display: none; }
    .position-fields.visible {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .position-fields .field { margin-bottom: 0; }

    /* segmented "Watching / I own it" control */
    .seg-control {
      display: inline-flex;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 16px;
    }
    .seg-btn {
      padding: 7px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6b7280;
      transition: background .15s, color .15s;
    }
    .seg-btn.active {
      background: #fff;
      color: #111827;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .seg-btn.active.owned-btn { color: #5b21b6; }

    /* ── buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 9px 18px; border-radius: 7px; font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; transition: filter .15s, opacity .15s;
    }
    .btn:hover { filter: brightness(.93); }
    .btn:active { opacity: .8; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary {
      background: transparent; color: #6b7280;
      border: 1px solid #e5e7eb; font-weight: 500;
    }
    .btn-add { background: #6366f1; color: #fff; width: 100%; margin-top: 4px; }

    /* ── watchlist table ── */
    .watchlist-table {
      width: 100%; border-collapse: collapse; font-size: 14px;
      margin-bottom: 4px;
    }
    .watchlist-table th {
      text-align: left; padding: 8px 10px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: #9ca3af; border-bottom: 1px solid #e5e7eb;
    }
    .watchlist-table td {
      padding: 11px 10px; border-bottom: 1px solid #f3f4f6;
      color: #111827; vertical-align: middle;
    }
    .watchlist-table tr:last-child td { border-bottom: none; }
    .watchlist-table tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 9999px;
      font-size: 11px; font-weight: 600;
    }
    .badge-owned { background: #ede9fe; color: #5b21b6; }
    .badge-watching { background: #f3f4f6; color: #6b7280; }
    .btn-delete {
      background: none; border: none; cursor: pointer;
      color: #9ca3af; font-size: 16px; line-height: 1;
      padding: 2px 6px; border-radius: 5px;
      transition: color .15s, background .15s;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }
    .empty-state {
      text-align: center; padding: 32px 0;
      color: #9ca3af; font-size: 14px;
    }

    /* ── error / status ── */
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; min-height: 18px; }
    .status { color: #059669; font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ── setup screen ── */
    #setup, #app { display: none; }
    #setup.visible, #app.visible { display: block; }

    /* ── responsive ── */
    @media (max-width: 520px) {
      .card { padding: 18px 16px; }
      .add-grid { grid-template-columns: 1fr 1fr; }
      .add-grid .field:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ── Connect screen ── -->
    <div id="setup" class="visible">
      <div class="card">
        <h1>Stock Watchlist</h1>
        <p class="subtitle">Enter your connection details to get started.</p>
        <div class="field">
          <label for="supabase-url">Supabase URL</label>
          <input type="text" id="supabase-url" placeholder="https://xxxx.supabase.co" autocomplete="off" />
        </div>
        <div class="field">
          <label for="supabase-anon-key">Supabase anon key</label>
          <input type="text" id="supabase-anon-key" placeholder="sb_publishable_..." autocomplete="off" />
        </div>
        <div class="field">
          <label for="shared-secret">Shared secret</label>
          <input type="password" id="shared-secret" placeholder="••••••••" autocomplete="off" />
        </div>
        <button class="btn btn-primary" id="connect-btn" style="width:100%;margin-top:4px;">Connect</button>
        <p class="error" id="setup-error"></p>
      </div>
    </div>

    <!-- ── Main app ── -->
    <div id="app">

      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h1 style="font-size:20px;">Stock Watchlist</h1>
        <button class="btn btn-secondary" id="disconnect-btn" style="font-size:13px;padding:6px 14px;">Change connection</button>
      </div>

      <!-- Watchlist card -->
      <div class="card" style="padding:0;overflow:hidden;">
        <div id="watchlist-content"></div>
      </div>

      <!-- Add ticker card -->
      <div class="card">
        <h2>Add ticker</h2>

        <!-- Ticker + notes row -->
        <div style="display:grid;grid-template-columns:140px 1fr;gap:10px;margin-bottom:14px;">
          <div class="field" style="margin-bottom:0;">
            <label for="new-ticker">Symbol</label>
            <input type="text" id="new-ticker" placeholder="e.g. AAPL" maxlength="10" />
          </div>
          <div class="field" style="margin-bottom:0;">
            <label for="new-notes">Notes <span style="color:#9ca3af;font-weight:400;">(optional)</span></label>
            <input type="text" id="new-notes" placeholder="e.g. watching for earnings" />
          </div>
        </div>

        <!-- Watching / I own it selector -->
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;">Status</label>
          <div class="seg-control">
            <button class="seg-btn active" id="btn-watching" type="button">Watching</button>
            <button class="seg-btn owned-btn" id="btn-owned" type="button">I own it</button>
          </div>
        </div>

        <!-- Shares + cost basis — visible only when "I own it" is selected -->
        <div class="position-fields" id="position-fields">
          <div class="field">
            <label for="new-shares">Number of shares</label>
            <input type="number" id="new-shares" placeholder="e.g. 25" min="0" step="any" />
          </div>
          <div class="field">
            <label for="new-cost-basis">Avg. cost per share ($)</label>
            <input type="number" id="new-cost-basis" placeholder="e.g. 150.00" min="0" step="any" />
          </div>
        </div>

        <!-- Hidden checkbox kept for JS compatibility -->
        <input type="checkbox" id="new-owned" style="display:none;" />

        <button class="btn btn-add" id="add-btn">Add to watchlist</button>
        <p class="error" id="app-error"></p>
        <p class="status" id="app-status"></p>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
